apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "podinfo-app.fullname" . }}-test"
  labels:
    {{- include "podinfo-app.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:8.10.1
      command:
        - sh
        - -c
        - |
          set -eu
          BASE="http://{{ include "podinfo-app.fullname" . }}:{{ .Values.service.port }}"
          echo "probing $BASE/healthz"
          curl --fail --silent --show-error --max-time 5 "$BASE/healthz" | grep -q '"status":"ok"'
          echo "probing $BASE/"
          curl --fail --silent --show-error --max-time 5 "$BASE/" | grep -q '"podName"'
