name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # to create the GitHub Release
  packages: write   # to push the tagged image

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v6

      - name: Compute lowercase image repo
        id: meta
        run: |
          repo=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          ref="${GITHUB_REF_NAME}"
          # Strip leading 'v' for the docker tag (v1.2.3 → 1.2.3) so it
          # mirrors the chart's appVersion convention.
          tag="${ref#v}"
          echo "repo=$repo" >> "$GITHUB_OUTPUT"
          echo "tag=$tag"   >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.repo }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.repo }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: |
            Container image published to:
            `${{ steps.meta.outputs.repo }}:${{ steps.meta.outputs.tag }}`
