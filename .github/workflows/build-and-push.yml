name: build-and-push

on:
  push:
    branches: [main]
    paths-ignore:
      - "environments/**"
      - "docs/**"
      - "README.md"
      - "PLAN.md"
      - ".github/dependabot.yml"

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false   # don't drop in-flight builds — image is the SoT

jobs:
  build:
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    uses: NoobCoder1209/github-actions-templates/.github/workflows/_docker-buildx.yml@v0.1.0
    with:
      # GHCR rejects uppercase in image paths — pre-lowercase the repo slug.
      # Hardcoded because GHA expressions don't support tr/lower.
      image: noobcoder1209/devopscourse
      tag: sha-${{ github.sha }}
      context: .
      dockerfile: Dockerfile
      platforms: linux/amd64
      push: true
      provenance: true

  bump-dev:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute short SHA tag
        id: tag
        run: echo "value=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Install yq
        env:
          YQ_VERSION: v4.44.3
          YQ_SHA256: a2c097180dd884a8d50c956ee16a9cec070f30a7947cf4ebf87d5f36213e9ed7
        run: |
          set -eu
          sudo wget -q -O /usr/local/bin/yq \
            "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          echo "${YQ_SHA256}  /usr/local/bin/yq" | sha256sum --check -
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Bump environments/dev/values.yaml image.tag
        env:
          NEW_TAG: ${{ steps.tag.outputs.value }}
        run: |
          yq -i '.image.tag = strenv(NEW_TAG)' environments/dev/values.yaml
          echo "--- after bump ---"
          cat environments/dev/values.yaml

      - name: Commit + push
        env:
          NEW_TAG: ${{ steps.tag.outputs.value }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet environments/dev/values.yaml; then
            echo "no change to dev tag — nothing to commit"
            exit 0
          fi
          git add environments/dev/values.yaml
          git commit -m "chore(dev): bump image to $NEW_TAG [skip ci]"
          git push
